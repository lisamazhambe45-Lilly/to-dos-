{% extends 'todos/base.html' %}

{% block title %}Create Todo{% endblock %}

{% block content %}
<div class="panel">
    <div class="section-inner">
        <div style="display:grid; gap: 16px; margin-bottom: 24px;">
            <p style="text-transform: uppercase; letter-spacing: 0.35em; color: #8b5cf6; font-size: 0.8rem; margin: 0;">New task</p>
            <h1 style="margin: 0; font-size: clamp(2rem, 3vw, 3rem);">Create a new todo</h1>
            <p style="margin: 0; color: #94a3b8; line-height: 1.8;">Add a clear title and optional description for the next task you want to finish.</p>
        </div>

        <form method="post" class="form-panel">
            {% csrf_token %}
            <div class="field">
                <label for="id_title">Title</label>
                {{ form.title }}
            </div>
            <div class="field">
                <label for="id_description">Description</label>
                {{ form.description }}
            </div>
            <div class="page-actions" style="margin-top: 16px;">
                <button type="submit" class="btn btn-primary">Save Todo</button>
                <a href="{% url 'todo_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
