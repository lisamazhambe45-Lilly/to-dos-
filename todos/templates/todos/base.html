<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Todo{% endblock %}</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #f8fafc;
            background: #000;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: #08090d;
            color: #f8fafc;
        }

        body {
            padding: 30px 20px;
        }

        .page-shell {
            min-height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-container {
            width: min(1120px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 30px;
        }

        .panel {
            background: rgba(15, 23, 42, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .section-inner {
            padding: 36px;
        }

        .hero-grid {
            display: grid;
            gap: 24px;
            grid-template-columns: minmax(280px, 1.25fr) minmax(320px, 0.85fr);
            align-items: center;
        }

        .hero-copy h1 {
            font-size: clamp(2.6rem, 4vw, 4rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
            margin: 0;
        }

        .hero-copy p {
            margin: 24px 0 0;
            max-width: 640px;
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.8;
        }

        .hero-card {
            background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(10,14,26,.98));
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 28px;
            padding: 32px;
        }

        .hero-card h2 {
            margin: 0 0 18px;
            font-size: 1.4rem;
            letter-spacing: 0.02em;
            color: #f8fafc;
        }

        .hero-card p {
            margin: 0;
            color: #cbd5e1;
            line-height: 1.7;
        }

        .page-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .btn,
        button,
        .link-button {
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary,
        .btn-primary:hover {
            background: linear-gradient(90deg, #8b5cf6, #7c3aed);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #f8fafc;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn:hover,
        .link-button:hover {
            transform: translateY(-1px);
        }

        .card-grid {
            display: grid;
            gap: 20px;
        }

        .todo-item,
        .form-panel,
        .confirm-panel {
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 25px 70px rgba(0,0,0,.4);
        }

        .todo-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
        }

        .todo-item.completed {
            opacity: 0.72;
        }

        .todo-content {
            display: grid;
            gap: 10px;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .description {
            color: #94a3b8;
            line-height: 1.7;
            margin: 0;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: end;
        }

        .field {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }

        .field label {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            min-height: 48px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            color: #f8fafc;
            padding: 14px 16px;
            border-radius: 18px;
            outline: none;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        input::placeholder,
        textarea::placeholder {
            color: #64748b;
        }

        .form-panel .field:last-child {
            margin-bottom: 24px;
        }

        .empty {
            color: #94a3b8;
            padding: 32px;
            text-align: center;
            border: 1px dashed rgba(255,255,255,0.12);
            border-radius: 24px;
        }

        @media (max-width: 860px) {
            .hero-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 540px) {
            .page-container {
                gap: 20px;
            }

            .page-shell {
                padding: 20px 16px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="page-shell">
        <div class="page-container">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
